<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Skill Sphere · Dark Enterprise — Advanced Resource Hub</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111117;
            --bg-tertiary: #1a1a24;
            --bg-card: #14141fe6;
            --bg-input: #1e1e2a;
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #6b6b7b;
            --border-light: #2a2a35;
            --glow-color: rgba(139, 92, 246, 0.5);
            --gradient-primary: linear-gradient(135deg, #8b5cf6, #6366f1);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-glow: 0 0 15px var(--glow-color);
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Login & core layout */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); position: relative; overflow: hidden; }
        .login-bg-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border-light) 1px, transparent 1px), linear-gradient(90deg, var(--border-light) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.08; animation: gridMove 25s linear infinite; }
        @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
        .login-card { background: rgba(17,17,23,0.9); backdrop-filter: blur(16px); padding: 2rem; border-radius: var(--radius-xl); width: 90%; max-width: 420px; border: 1px solid var(--border-light); box-shadow: 0 25px 45px rgba(0,0,0,0.5), var(--shadow-glow); }
        .login-logo { width: 80px; height: 80px; background: var(--gradient-primary); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; font-size: 2.5rem; box-shadow: var(--shadow-glow); }
        .input-field { width: 100%; padding: 1rem 1rem 1rem 3rem; background: var(--bg-input); border: 2px solid var(--border-light); border-radius: var(--radius-md); color: white; font-size: 1rem; transition: var(--transition); }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,92,246,0.3); }
        .login-btn { background: var(--gradient-primary); width: 100%; padding: 1rem; border: none; border-radius: var(--radius-md); font-weight: 700; font-size: 1rem; cursor: pointer; transition: var(--transition); }
        .error-message { background: rgba(239,68,68,0.15); border-left: 4px solid var(--danger); display: none; margin-bottom: 1rem; padding: 0.8rem; border-radius: var(--radius-md); }

        /* main dashboard */
        .main-container { display: none; min-height: 100vh; }
        .main-container.authenticated { display: block; }
        .nav-wrapper { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); background: rgba(10,10,15,0.85); border-bottom: 1px solid var(--border-light); }
        .navbar { padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .logo-icon { width: 44px; height: 44px; background: var(--gradient-primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
        .user-badge { background: var(--bg-tertiary); border-radius: 60px; padding: 0.3rem 1rem 0.3rem 0.5rem; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 36px; height: 36px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logout-btn { background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 0.5rem 1.2rem; cursor: pointer; transition: var(--transition); }

        /* search */
        .global-search { padding: 1rem 1.5rem; max-width: 1600px; margin: 0 auto; }
        .search-wrapper { background: var(--bg-tertiary); border-radius: 60px; border: 1px solid var(--border-light); display: flex; align-items: center; transition: var(--transition); }
        .search-wrapper:focus-within { border-color: var(--primary); box-shadow: var(--shadow-glow); }
        .search-input { flex: 1; background: transparent; border: none; padding: 0.9rem 1rem; color: white; font-size: 1rem; }
        .search-clear { background: none; border: none; color: var(--text-tertiary); padding: 0 1rem; cursor: pointer; font-size: 1.2rem; display: none; }

        /* hero & quick */
        .hero { padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1400px; margin: 0 auto; align-items: center; }
        @media (max-width: 800px) { .hero { grid-template-columns: 1fr; text-align: center; } .hero-stats { justify-content: center; } }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius-xl); }
        .quick-item { background: var(--bg-tertiary); padding: 0.8rem; border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: var(--transition); border: 1px solid var(--border-light); }
        .quick-item:active { transform: scale(0.96); background: var(--primary); }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* tabs */
        .tabs-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0.5rem 1rem 1rem; scrollbar-width: thin; }
        .tab { background: var(--bg-tertiary); border: 1px solid var(--border-light); border-radius: 60px; padding: 0.6rem 1.4rem; white-space: nowrap; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .tab.active { background: var(--gradient-primary); border-color: transparent; box-shadow: var(--shadow-glow); }
        .cards-grid { display: none; padding: 0 1.5rem 3rem; max-width: 1600px; margin: 0 auto; }
        .cards-grid.active { display: block; }
        .card-collection { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.8rem; }

        .resource-card { background: var(--bg-card); backdrop-filter: blur(8px); border-radius: var(--radius-lg); border: 1px solid var(--border-light); transition: var(--transition); overflow: hidden; }
        .resource-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .card-glow { height: 3px; background: var(--gradient-primary); width: 0%; transition: width 0.4s; }
        .resource-card:hover .card-glow { width: 100%; }
        .link-item { display: flex; align-items: center; gap: 12px; padding: 0.9rem; background: var(--bg-tertiary); margin-bottom: 8px; border-radius: var(--radius-md); cursor: pointer; transition: 0.2s; touch-action: manipulation; }
        .link-item:active { background: var(--primary-dark); transform: translateX(4px); }
        .link-icon { width: 42px; height: 42px; background: rgba(139,92,246,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .link-title { font-weight: 500; font-size: 0.9rem; }
        .video-badge { background: #ff000020; color: #ff4d4d; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; }

        /* YouTube Modal - fully touch optimised */
        .youtube-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; z-index: 2000; touch-action: none; }
        .youtube-modal.active { display: flex; }
        .modal-content { background: #0a0a0f; width: 95%; max-width: 1100px; border-radius: 28px; border: 1px solid var(--border-light); overflow: hidden; box-shadow: 0 30px 50px rgba(0,0,0,0.6); }
        .modal-header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #111117; }
        .close-modal { font-size: 2rem; background: none; border: none; color: white; cursor: pointer; line-height: 1; padding: 0 10px; }
        .video-container { position: relative; width: 100%; background: black; }
        .video-container iframe { width: 100%; height: 60vh; min-height: 300px; border: none; display: block; }
        @media (max-width: 700px) { .video-container iframe { height: 45vh; } }

        .fullscreen-btn { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); border: none; color: white; padding: 12px; border-radius: 40px; cursor: pointer; z-index: 10; backdrop-filter: blur(4px); font-size: 1.3rem; }
        .empty-state { text-align: center; padding: 3rem; background: var(--bg-card); border-radius: var(--radius-lg); }
        .loading-container { text-align: center; padding: 4rem; }
        .footer { padding: 2rem; text-align: center; border-top: 1px solid var(--border-light); font-size: 0.8rem; color: var(--text-tertiary); }

        button, .tab, .quick-item, .link-item { cursor: pointer; touch-action: manipulation; }
    </style>
</head>
<body>
    <div class="login-container" id="loginPage">
        <div class="login-bg-grid"></div>
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-cubes"></i></div>
            <h1 style="text-align:center; font-size:2rem;">Skill Sphere</h1>
            <p style="text-align:center; color:var(--text-secondary); margin-bottom:2rem;">Dark Enterprise · Secure Access</p>
            <div class="error-message" id="loginError"><i class="fas fa-exclamation-triangle"></i> Invalid credentials</div>
            <div class="input-group"><label>Phone</label><div class="input-field-wrapper"><i class="fas fa-phone input-icon" style="position:absolute; left:15px; top:16px;"></i><input type="tel" id="loginPhone" class="input-field" placeholder="+91 9999999999"></div></div>
            <div class="input-group"><label>Password</label><div class="input-field-wrapper"><i class="fas fa-lock input-icon" style="position:absolute; left:15px; top:16px;"></i><input type="password" id="loginPassword" class="input-field" placeholder="··········"></div></div>
            <button class="login-btn" id="loginBtn"><i class="fas fa-shield-alt"></i> Authenticate</button>
        </div>
    </div>

    <div class="main-container" id="mainDashboard">
        <div class="nav-wrapper"><div class="navbar"><div class="logo-group" style="display:flex; gap:12px; align-items:center;"><div class="logo-icon"><i class="fas fa-cubes"></i></div><div><div class="logo-text" style="font-weight:800;">Skill Sphere</div><div style="font-size:10px;">dark enterprise</div></div></div><div class="user-menu"><div class="user-badge"><div class="user-avatar" id="userAvatar">U</div><span id="displayUserPhone"></span></div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button></div></div></div>

        <div class="global-search"><div class="search-wrapper"><i class="fas fa-search" style="padding-left:1rem; color:var(--text-tertiary);"></i><input type="text" id="globalSearchInput" class="search-input" placeholder="🔍 Search by title, category, YouTube..."><button class="search-clear" id="searchClearBtn"><i class="fas fa-times-circle"></i></button></div><div class="search-results-count" id="searchResultsCount"></div></div>

        <div class="hero"><div class="hero-content"><div class="hero-badge" style="background:var(--gradient-glow); display:inline-block; padding:5px 12px; border-radius:30px;"><i class="fas fa-shield-alt"></i> Encrypted session</div><h1 style="font-size:2.4rem; margin-top:1rem;">Secure <span class="gradient-text" style="background:var(--gradient-primary); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Resource</span> Hub</h1><div class="hero-stats" style="display:flex; gap:2rem; margin-top:1.5rem;"><div><div class="stat-value" id="totalLinksCount">0</div><div>Resources</div></div><div><div class="stat-value" id="activeCategoriesCount">0</div><div>Categories</div></div></div></div><div class="hero-visual"><div class="quick-grid" id="quickAccess"></div></div></div>

        <div class="category-section"><div class="section-header" style="display:flex; justify-content:space-between; padding:0 1.5rem;"><h2><i class="fas fa-layer-group"></i> Categories</h2><span id="activeCategoryCount" class="category-counter"></span></div><div class="tabs-scroll" id="categoryTabs"></div></div>
        <div id="loadingState" class="loading-container" style="display:none;"><div class="loader"></div></div>
        <div id="cardsGridContainer"></div>
        <footer class="footer"><div>© 2026 Skill Sphere · Touch Optimized & Advanced Search</div></footer>
    </div>

    <div class="youtube-modal" id="youtubeModal"><div class="modal-content"><div class="modal-header"><h3><i class="fab fa-youtube" style="color:#ff0000;"></i> YouTube Player</h3><button class="close-modal" id="closeYoutubeModal">&times;</button></div><div class="video-container" id="youtubePlayerContainer" style="position:relative;"><button id="fullscreenModalBtn" class="fullscreen-btn" style="position:absolute; bottom:20px; right:20px; z-index:20;"><i class="fas fa-expand"></i></button></div></div></div>

    <script>
        // ==================== CONFIGURATION ====================
        const SHEET_CONFIG = {
            spreadsheetId: '1mJlxCazF9xaszf2QiX7_ysYhYKLsJk3aOmkMA4-wOvk',
            categories: ['HTML','CSS','JavaScript','Python','Skills','Book 1','Book 2','Book 3','Book 4','Book 5','All Books','Programming','Other Tools','Editing','Stock Market','Notes'],
            hiddenCategories: ['Referral Code', 'Phone Number', 'Password']
        };
        const CATEGORY_META = {
            'HTML':{icon:'fab fa-html5'},'CSS':{icon:'fab fa-css3-alt'},'JavaScript':{icon:'fab fa-js'},'Python':{icon:'fab fa-python'},
            'Skills':{icon:'fas fa-code-branch'},'Book 1':{icon:'fas fa-book'},'Book 2':{icon:'fas fa-book-open'},'Book 3':{icon:'fas fa-book-reader'},
            'Book 4':{icon:'fas fa-bookmark'},'Book 5':{icon:'fas fa-book-medical'},'All Books':{icon:'fas fa-books'},'Programming':{icon:'fas fa-laptop-code'},
            'Other Tools':{icon:'fas fa-tools'},'Editing':{icon:'fas fa-pen-fancy'},'Stock Market':{icon:'fas fa-chart-line'},'Notes':{icon:'fas fa-sticky-note'}
        };
        let authenticatedUser = null, linksData = {}, phonePasswordMap = {}, allItems = [], currentCategory = 'HTML';
        // DOM
        const loginPage = document.getElementById('loginPage'), mainDash = document.getElementById('mainDashboard');
        const loginBtn = document.getElementById('loginBtn'), logoutBtn = document.getElementById('logoutBtn');
        const loginPhone = document.getElementById('loginPhone'), loginPassword = document.getElementById('loginPassword'), loginErrorDiv = document.getElementById('loginError');
        const displayUserPhoneSpan = document.getElementById('displayUserPhone'), userAvatarSpan = document.getElementById('userAvatar');
        const categoryTabs = document.getElementById('categoryTabs'), cardsGridContainer = document.getElementById('cardsGridContainer');
        const totalLinksSpan = document.getElementById('totalLinksCount'), activeCategoriesSpan = document.getElementById('activeCategoriesCount');
        const quickAccessDiv = document.getElementById('quickAccess'), searchInput = document.getElementById('globalSearchInput'), searchClearBtn = document.getElementById('searchClearBtn'), searchResultsCountSpan = document.getElementById('searchResultsCount');
        const youtubeModal = document.getElementById('youtubeModal'), closeModalBtn = document.getElementById('closeYoutubeModal'), youtubePlayerContainer = document.getElementById('youtubePlayerContainer');
        const fullscreenModalBtn = document.getElementById('fullscreenModalBtn');
        let currentPlayerIframe = null;

        // Helper: load sheet or fallback demo
        async function loadSheetData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_CONFIG.spreadsheetId}/export?format=csv&gid=0`;
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                buildPhoneMap(rows);
                processSheetRows(rows);
            } catch(e) { console.warn(e); useDemoData(); }
        }
        function buildPhoneMap(rows) {
            const headers = rows[0] || [];
            const phoneIdx = headers.findIndex(h => h.toLowerCase().includes('phone'));
            const passIdx = headers.findIndex(h => h.toLowerCase().includes('password'));
            for(let i=1;i<rows.length;i++) {
                let phone = rows[i][phoneIdx]?.trim(), pass = rows[i][passIdx]?.trim();
                if(phone && pass) phonePasswordMap[phone] = pass;
            }
            if(Object.keys(phonePasswordMap).length===0) phonePasswordMap={'9999999999':'password123','9876543210':'admin'};
        }
        function processSheetRows(rows) {
            const visibleCats = SHEET_CONFIG.categories.filter(c => !SHEET_CONFIG.hiddenCategories.includes(c));
            visibleCats.forEach(c => linksData[c]=[]);
            const headers = rows[0];
            for(let i=1;i<rows.length;i++) {
                headers.forEach((h,idx)=>{
                    let val = rows[i][idx]?.trim();
                    if(!val) return;
                    let cat = mapHeaderToCategory(h);
                    if(cat && linksData[cat] && !SHEET_CONFIG.hiddenCategories.includes(cat)) {
                        linksData[cat].push({ value:val, type:isValidUrl(val)?'link':'text', title:generateSmartTitle(val), source:extractDomain(val), raw:val });
                    }
                });
            }
            // All Books aggregation
            let allBooksArr = [];
            ['Book 1','Book 2','Book 3','Book 4','Book 5'].forEach(b=>{ if(linksData[b]) allBooksArr.push(...linksData[b]); });
            linksData['All Books'] = [...new Map(allBooksArr.map(item=>[item.value,item])).values()];
            updateStatsAndIndex();
        }
        function useDemoData() {
            phonePasswordMap = {'9999999999':'password123'};
            const demo = { 'HTML':[{value:'https://www.youtube.com/watch?v=dD2EISBDjWM',type:'link',title:'HTML Crash Course',source:'YouTube'}], 'CSS':[{value:'https://www.w3schools.com/css/',type:'link',title:'CSS Tutorial',source:'W3Schools'}], 'JavaScript':[{value:'https://www.youtube.com/watch?v=PkZNo7MFNFg',type:'link',title:'JS Full Course',source:'YouTube'}], 'Python':[{value:'https://youtu.be/_uQrJ0TkZlc',type:'link',title:'Python Basics',source:'YouTube'}], 'Notes':[{value:'Closures in JS explained',type:'text',title:'closure note',source:'internal'}] };
            SHEET_CONFIG.categories.forEach(c=>{ if(demo[c]) linksData[c]=demo[c]; else linksData[c]=[]; });
            updateStatsAndIndex();
        }
        function updateStatsAndIndex() {
            let total=0; Object.values(linksData).forEach(arr=>total+=arr.length);
            totalLinksSpan.innerText=total;
            let visibleCount = SHEET_CONFIG.categories.filter(c=>!SHEET_CONFIG.hiddenCategories.includes(c) && linksData[c]?.length>0).length;
            activeCategoriesSpan.innerText=visibleCount;
            document.getElementById('activeCategoryCount').innerText=visibleCount+' cats';
            allItems = [];
            Object.keys(linksData).forEach(cat=>{(linksData[cat]||[]).forEach(item=>allItems.push({...item,category:cat,title:item.title.toLowerCase()}))});
        }
        function mapHeaderToCategory(header){
            let h=header.toLowerCase();
            if(h.includes('html')) return 'HTML'; if(h.includes('css')) return 'CSS'; if(h.includes('js')||h.includes('javascript')) return 'JavaScript';
            if(h.includes('python')) return 'Python'; if(h.includes('skill')) return 'Skills'; if(h.includes('book1')) return 'Book 1';
            if(h.includes('book2')) return 'Book 2'; if(h.includes('book3')) return 'Book 3'; if(h.includes('book4')) return 'Book 4';
            if(h.includes('book5')) return 'Book 5'; if(h.includes('all books')) return 'All Books'; if(h.includes('programming')) return 'Programming';
            if(h.includes('other')) return 'Other Tools'; if(h.includes('edit')) return 'Editing'; if(h.includes('stock')) return 'Stock Market';
            if(h.includes('note')) return 'Notes'; return null;
        }
        function isValidUrl(str){ try{ new URL(str); return true; }catch{ return false; } }
        function extractDomain(url){ try{ let host=new URL(url).hostname; if(host.includes('youtube')) return 'YouTube'; return host.split('.')[0]; }catch{ return 'link';} }
        function generateSmartTitle(val){
            if(isValidUrl(val)){
                if(val.includes('youtube.com/watch')||val.includes('youtu.be')){ let id=extractYouTubeId(val); return id?`🎬 YouTube Video (${id})`:'Video Link';}
                let u=new URL(val); return u.pathname.split('/').pop()?.replace(/-/g,' ') || u.hostname;
            } return val.length>45?val.slice(0,45)+'...':val;
        }
        function extractYouTubeId(url){ try{ let u=new URL(url); if(u.hostname.includes('youtube.com')) return u.searchParams.get('v'); if(u.hostname.includes('youtu.be')) return u.pathname.slice(1); }catch{} return null; }

        function renderDashboard() {
            renderQuickAccess();
            renderTabs();
            renderAllCategoryGrids();
            switchCategory(currentCategory);
        }
        function renderQuickAccess(){
            quickAccessDiv.innerHTML='';
            ['HTML','CSS','JavaScript','Python','All Books','Notes'].forEach(c=>{
                if(linksData[c]?.length){
                    let el=document.createElement('div'); el.className='quick-item'; el.innerHTML=`<i class="${CATEGORY_META[c]?.icon||'fas fa-link'}"></i><span>${c}</span>`;
                    el.addEventListener('click',()=>{ let tab=Array.from(document.querySelectorAll('.tab')).find(t=>t.dataset.category===c); if(tab) tab.click(); });
                    quickAccessDiv.appendChild(el);
                }
            });
        }
        function renderTabs(){
            let visible=SHEET_CONFIG.categories.filter(c=>!SHEET_CONFIG.hiddenCategories.includes(c) && linksData[c]?.length);
            categoryTabs.innerHTML='';
            visible.forEach(c=>{
                let tab=document.createElement('div'); tab.className=`tab ${c===currentCategory?'active':''}`; tab.dataset.category=c;
                tab.innerHTML=`<i class="${CATEGORY_META[c]?.icon||'fas fa-folder'}"></i><span>${c}</span>`;
                tab.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentCategory=c; switchCategory(c); });
                categoryTabs.appendChild(tab);
            });
        }
        function renderAllCategoryGrids(){
            cardsGridContainer.innerHTML='';
            let visible=SHEET_CONFIG.categories.filter(c=>!SHEET_CONFIG.hiddenCategories.includes(c) && linksData[c]?.length);
            visible.forEach(cat=>{
                let gridDiv=document.createElement('div'); gridDiv.className='cards-grid'; gridDiv.id=`grid-${cat.replace(/\s/g,'')}`;
                cardsGridContainer.appendChild(gridDiv);
                renderCategoryGrid(gridDiv,cat);
            });
        }
        function renderCategoryGrid(container,category){
            let items=linksData[category]||[];
            if(!items.length){ container.innerHTML=`<div class="empty-state"><i class="fas fa-folder-open"></i><p>No items</p></div>`; return; }
            let chunks=[]; for(let i=0;i<items.length;i+=5) chunks.push(items.slice(i,i+5));
            let cardsHtml='<div class="card-collection">';
            chunks.forEach((chunk,idx)=>{
                let itemsHtml='';
                chunk.forEach(item=>{
                    let ytid=item.type==='link'?extractYouTubeId(item.value):null;
                    let isYoutube=!!ytid;
                    itemsHtml+=`<div class="link-item" data-url="${escapeHtml(item.value)}" data-ytid="${ytid||''}" data-type="${item.type}">
                        <div class="link-icon"><i class="${isYoutube?'fab fa-youtube':'fas fa-external-link-alt'}"></i></div>
                        <div class="link-details"><div class="link-title">${escapeHtml(item.title)} ${isYoutube?'<span class="video-badge"><i class="fas fa-play"></i> video</span>':''}</div><div class="link-meta">${escapeHtml(item.source)}</div></div>
                    </div>`;
                });
                cardsHtml+=`<div class="resource-card"><div class="card-glow"></div><div class="card-header"><h3><i class="${CATEGORY_META[category]?.icon||'fas fa-th'}"></i> ${category}</h3><div class="card-badge">${idx*5+1}-${Math.min((idx+1)*5,items.length)}</div></div><div class="card-content"><div class="link-list">${itemsHtml}</div></div></div>`;
            });
            cardsHtml+='</div>';
            container.innerHTML=cardsHtml;
        }
        function switchCategory(category){ document.querySelectorAll('.cards-grid').forEach(g=>g.classList.remove('active')); let target=document.getElementById(`grid-${category.replace(/\s/g,'')}`); if(target) target.classList.add('active'); }

        // --- ADVANCED SEARCH with youtube highlight ---
        function performSearch(query){
            let q=query.trim().toLowerCase();
            let filtered=allItems.filter(i=> i.title.toLowerCase().includes(q) || i.category.toLowerCase().includes(q) || (i.value && i.value.toLowerCase().includes(q)));
            let existingGrid=document.getElementById('grid-SearchResults');
            if(existingGrid) existingGrid.remove();
            let searchGrid=document.createElement('div'); searchGrid.className='cards-grid active'; searchGrid.id='grid-SearchResults';
            cardsGridContainer.appendChild(searchGrid);
            if(filtered.length===0){ searchGrid.innerHTML=`<div class="empty-state"><i class="fas fa-search"></i><h3>No results</h3></div>`; searchResultsCountSpan.innerText='0 results'; }
            else{
                let chunks=[]; for(let i=0;i<filtered.length;i+=5) chunks.push(filtered.slice(i,i+5));
                let html='<div class="card-collection">';
                chunks.forEach((chunk,idx)=>{
                    let itemsHtml='';
                    chunk.forEach(item=>{
                        let ytid=item.type==='link'?extractYouTubeId(item.value):null;
                        let isVideo=!!ytid;
                        itemsHtml+=`<div class="link-item" data-url="${escapeHtml(item.value)}" data-ytid="${ytid||''}" data-type="${item.type}">
                            <div class="link-icon"><i class="${isVideo?'fab fa-youtube':'fas fa-link'}"></i></div>
                            <div class="link-details"><div class="link-title">${escapeHtml(item.title)} ${isVideo?'<span class="video-badge"><i class="fas fa-video"></i> watch</span>':''}</div><div class="link-meta">${escapeHtml(item.category)} · ${escapeHtml(item.source)}</div></div>
                        </div>`;
                    });
                    html+=`<div class="resource-card"><div class="card-glow"></div><div class="card-header"><h3><i class="fas fa-search"></i> Search: "${escapeHtml(q)}"</h3><div class="card-badge">${idx*5+1}-${Math.min((idx+1)*5,filtered.length)}</div></div><div class="card-content"><div class="link-list">${itemsHtml}</div></div></div>`;
                });
                html+='</div>';
                searchGrid.innerHTML=html;
                searchResultsCountSpan.innerText=`${filtered.length} result${filtered.length!==1?'s':''}`;
            }
            document.querySelectorAll('.cards-grid').forEach(g=>{ if(g.id!=='grid-SearchResults') g.classList.remove('active'); });
        }
        function clearSearch(){ searchInput.value=''; searchClearBtn.style.display='none'; searchResultsCountSpan.innerText=''; let sr=document.getElementById('grid-SearchResults'); if(sr) sr.remove(); switchCategory(currentCategory); }
        function handleSearchInput(){ let val=searchInput.value.trim(); if(val){ searchClearBtn.style.display='block'; performSearch(val); } else clearSearch(); }

        // --- YOUTUBE MODAL with fullscreen & touch enhancements ---
        let currentVideoId=null;
        function openYouTubeModal(videoId){
            currentVideoId=videoId;
            youtubePlayerContainer.innerHTML='';
            let iframe=document.createElement('iframe');
            iframe.src=`https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1&controls=1&rel=0&modestbranding=1`;
            iframe.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen";
            iframe.allowFullscreen=true;
            iframe.style.width='100%'; iframe.style.height='60vh'; iframe.style.minHeight='300px';
            iframe.setAttribute('playsinline','true');
            let fullBtn=document.createElement('button'); fullBtn.className='fullscreen-btn'; fullBtn.innerHTML='<i class="fas fa-expand"></i>';
            fullBtn.onclick=()=>{ if(iframe.requestFullscreen) iframe.requestFullscreen(); else if(iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen(); };
            let containerDiv=document.createElement('div'); containerDiv.style.position='relative'; containerDiv.appendChild(iframe); containerDiv.appendChild(fullBtn);
            youtubePlayerContainer.appendChild(containerDiv);
            youtubeModal.classList.add('active');
            currentPlayerIframe=iframe;
        }
        function closeYouTubeModal(){ youtubeModal.classList.remove('active'); if(youtubePlayerContainer) youtubePlayerContainer.innerHTML=''; currentVideoId=null; }
        function handleGlobalLinkClick(e){
            let item=e.target.closest('.link-item');
            if(!item) return;
            e.preventDefault();
            let url=item.dataset.url, ytid=item.dataset.ytid, type=item.dataset.type;
            if(type==='link' && ytid && ytid!=='null' && ytid!=='') openYouTubeModal(ytid);
            else if(type==='link' && url) window.open(url,'_blank');
            else if(type==='text') alert("📄 Note: "+ (item.innerText?.slice(0,100)||'Content'));
        }

        // --- AUTH & INIT ---
        function handleLogin(){
            let phone=loginPhone.value.trim(), pass=loginPassword.value;
            if(phonePasswordMap[phone] && phonePasswordMap[phone]===pass){
                authenticatedUser=phone;
                displayUserPhoneSpan.innerText=phone.slice(0,3)+'****'+phone.slice(-3);
                userAvatarSpan.innerText=phone.slice(-2).toUpperCase();
                loginPage.style.display='none'; mainDash.classList.add('authenticated');
                renderDashboard();
            } else { loginErrorDiv.style.display='flex'; setTimeout(()=>loginErrorDiv.style.display='none',2000); }
        }
        function handleLogout(){ authenticatedUser=null; mainDash.classList.remove('authenticated'); loginPage.style.display='flex'; clearSearch(); }
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // event binding
        document.addEventListener('DOMContentLoaded',()=>{
            loadSheetData().then(()=>{ if(!authenticatedUser){} });
            loginBtn.addEventListener('click',handleLogin);
            logoutBtn.addEventListener('click',handleLogout);
            searchInput.addEventListener('input',handleSearchInput);
            searchClearBtn.addEventListener('click',clearSearch);
            closeModalBtn.addEventListener('click',closeYouTubeModal);
            youtubeModal.addEventListener('click',(e)=>{ if(e.target===youtubeModal) closeYouTubeModal(); });
            document.body.addEventListener('click',handleGlobalLinkClick);
            ['keypress'].forEach(ev=>{ loginPhone.addEventListener('keypress',e=>{if(e.key==='Enter')handleLogin();}); loginPassword.addEventListener('keypress',e=>{if(e.key==='Enter')handleLogin();}); });
        });
    </script>
</body>
</html>
